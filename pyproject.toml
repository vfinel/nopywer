[project]
name = "nopywer"
version = "0.1.0"
description = "Power grid analysis tool"
requires-python = ">=3.12"
license = "GPL-3.0-or-later"
dependencies = [
    "matplotlib>=3.10",
    "networkx>=3.4",
    "odfpy>=1.4",
    "pandas>=2.2",
    "pulp>=2.8",
    "typer>=0.15",
]

[project.scripts]
nopywer-analyze = "analyze_grid:app"
